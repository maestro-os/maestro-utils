name: Check
on: [push, pull_request]
jobs:
  build_mocklinux:
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v6
      - name: Build mocklinux
        working-directory: mocklinux
        run: make
  clippy:
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v6
      - name: Clippy
        run: cargo clippy --all-features --all-targets
  build:
    runs-on: [self-hosted, linux]
    needs: clippy
    steps:
      - name: Debug
        run: cargo build
      - name: Release
        run: cargo build --release
  test:
    runs-on: [self-hosted, linux]
    needs: build
    steps:
      - name: Test
        run: cargo test
  format:
    runs-on: [self-hosted, linux]
    needs: clippy
    steps:
      - name: Check format
        run: cargo fmt --check
